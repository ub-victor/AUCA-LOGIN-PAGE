<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUCA Registration – Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #fff;
        }

        .page-wrap {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px 32px;
            background: #fff;
            overflow-y: auto;
        }

        .inner {
            width: 100%;
            max-width: 380px;
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo-img {
            width: 220px;
            height: auto;
        }

        h1.page-heading {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1a4799;
            text-align: center;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: #555;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 0.82rem;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        .form-input {
            width: 100%;
            border: 1px solid #bbb;
            border-radius: 3px;
            padding: 7px 10px;
            font-size: 0.88rem;
        }

        .form-input:focus {
            border-color: #1a4799;
        }

        .btn-send {
            display: block;
            margin: 20px auto 14px;
            background: #5b7fba;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 9px 24px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-send:hover { background: #1a4799; }

        .bottom-link {
            display: block;
            text-align: center;
            font-size: 0.82rem;
            color: #555;
        }

        .bottom-link a {
            color: #1a4799;
            text-decoration: none;
            font-weight: 600;
        }

        .right-panel {
            width: 50%;
            background-image: url("images/gishushu_campus.jpg"); /* replace with your image path */
            background-size: cover;
            background-position: center;
        }

        @media (max-width: 600px) {
            .page-wrap {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
            }

            .right-panel {
                width: 100%;
                height: 220px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="inner">

                <!-- Logo -->
                <div class="logo-wrap">
                    <img src="images/auca_logo.png" alt="AUCA Logo" class="logo-img" />
                </div>

                <!-- Headings -->
                <h1 class="page-heading">Reset password</h1>
                <p class="page-subtitle">We will send password reset instructions on your email.</p>

                <!-- Example message (STATIC) -->
                <!-- Remove or replace with JS later -->
                <!--
                <div class="alert-success">
                    Email sent successfully!
                </div>
                -->

                <!-- Form -->
                <form method="POST" action="forgot_password.html">
                    
                    <div class="form-group">
                        <label class="field-label" for="email">Enter your Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="Enter your email"
                        />
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn-send">Send Reset Instructions</button>
                    </div>

                    <span class="bottom-link">
                        Remember the password? <a href="index.html">Login</a>
                    </span>
                </form>

            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel"></div>

    </div>
</body>
</html>
